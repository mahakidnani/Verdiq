kind = "web"
previewPath = "/"
title = "Verdiq"
version = "1.0.0"
id = "artifacts/verdiq-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24436

[services.development]
run = "pnpm --filter @workspace/verdiq-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verdiq-web", "run", "build" ]
publicDir = "artifacts/verdiq-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24436"
BASE_PATH = "/"
